<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="dots">
      <span class="dot orange"></span>
      <span class="dot green"></span>
      <span class="dot blue"></span>
    </div>
    <h2>Moviebox</h2>
  </div>

  <input id="search" placeholder="Search movies..." />
</nav>

<h2 class="heading">Trending</h2>
<div id="trending" class="row"></div>

<h2 class="heading">Recommended</h2>
<div id="recommended" class="row"></div>

<h2 class="heading">Watchlist</h2>
<div id="watchlist" class="row"></div>

<div id="modal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
